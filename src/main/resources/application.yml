spring:
  profiles:
    active: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/garage
    username: postgres
    password: admin321
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    root: INFO
    com.ctc: DEBUG

garage:
  init:
    enabled: true
